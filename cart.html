<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart — Maison Veil</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .cart-page { padding: 48px 0 100px; }
    .cart-page h1 { font-family: var(--serif); font-size: clamp(2rem,4vw,3.5rem); font-weight: 300; margin-bottom: 8px; }
    .cart-page h1 em { font-style: italic; color: var(--taupe); }
    .cart-sub { font-size: 0.82rem; color: var(--taupe); margin-bottom: 48px; }

    .cart-grid { display: grid; grid-template-columns: 1fr 380px; gap: 48px; align-items: flex-start; }

    /* ─── ITEMS ─── */
    .cart-items {}
    .cart-item {
      display: grid; grid-template-columns: 120px 1fr auto;
      gap: 24px; padding: 28px 0;
      border-bottom: 1px solid var(--mist);
    }
    .cart-item:first-child { border-top: 1px solid var(--mist); }
    .ci-img { aspect-ratio: 3/4; overflow: hidden; background: var(--bone); }
    .ci-img img { width: 100%; height: 100%; object-fit: cover; }
    .ci-body { display: flex; flex-direction: column; justify-content: space-between; }
    .ci-name { font-family: var(--serif); font-size: 1.05rem; margin-bottom: 4px; }
    .ci-meta { font-size: 0.75rem; color: var(--taupe); line-height: 1.6; }
    .ci-actions { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .ci-qty { display: flex; align-items: center; border: 1px solid var(--mist); }
    .ci-qty-btn { width: 32px; height: 32px; background: transparent; border: none; font-size: 0.9rem; cursor: pointer; color: var(--charcoal); }
    .ci-qty-btn:hover { background: var(--bone); }
    .ci-qty-val { width: 36px; text-align: center; border: none; border-left: 1px solid var(--mist); border-right: 1px solid var(--mist); height: 32px; font-size: 0.85rem; background: transparent; outline: none; }
    .ci-remove { background: none; border: none; cursor: pointer; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); text-decoration: underline; }
    .ci-price { text-align: right; display: flex; flex-direction: column; justify-content: space-between; }
    .ci-unit-price { font-size: 0.82rem; color: var(--taupe); }
    .ci-total-price { font-family: var(--serif); font-size: 1.1rem; }
    .ci-save { font-size: 0.72rem; color: var(--rust); }

    .empty-cart { text-align: center; padding: 80px 0; }
    .empty-cart-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
    .empty-cart h2 { font-family: var(--serif); font-size: 1.8rem; font-weight: 300; margin-bottom: 12px; }
    .empty-cart p { font-size: 0.88rem; color: var(--taupe); margin-bottom: 32px; }

    /* ─── SUMMARY ─── */
    .cart-summary { background: var(--bone); padding: 36px; position: sticky; top: 90px; }
    .cs-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 300; margin-bottom: 28px; }
    .cs-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 14px; }
    .cs-row.total { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; border-top: 1px solid var(--mist); padding-top: 18px; margin-top: 8px; margin-bottom: 24px; }
    .cs-saving { font-size: 0.78rem; color: var(--rust); text-align: center; margin-bottom: 16px; }
    .cs-promo { margin-bottom: 24px; }
    .promo-row { display: flex; gap: 0; margin-top: 8px; }
    .promo-input { flex: 1; padding: 10px 14px; border: 1px solid var(--mist); border-right: none; background: transparent; font-size: 0.82rem; outline: none; text-transform: uppercase; letter-spacing: 0.08em; }
    .promo-input:focus { border-color: var(--gold); }
    .promo-btn { padding: 10px 18px; background: var(--ink); color: var(--cream); border: none; font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: background 0.3s; }
    .promo-btn:hover { background: var(--gold); color: var(--ink); }
    .promo-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--taupe); }
    .cs-note { font-size: 0.72rem; color: var(--taupe); text-align: center; margin-top: 16px; line-height: 1.6; }
    .cs-trust { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .cs-trust-item { font-size: 0.7rem; color: var(--taupe); display: flex; align-items: center; gap: 4px; }

    /* ─── UPSELL ─── */
    .upsell { margin-top: 80px; }

    @media (max-width: 900px) {
      .cart-grid { grid-template-columns: 1fr; }
      .cart-summary { position: static; }
    }
    @media (max-width: 600px) {
      .cart-item { grid-template-columns: 90px 1fr; }
      .ci-price { display: none; }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="cart-page container">
    <div class="breadcrumb">
      <a href="index.html">Home</a><span>/</span>
      <span class="current">Cart</span>
    </div>
    <h1>Your <em>Cart</em></h1>
    <p class="cart-sub" id="cartSub"></p>

    <div id="mainContent"></div>

    <div class="upsell" id="upsellSection">
      <div class="section-head reveal">
        <h2>You Might <em>Also Like</em></h2>
        <a href="shop.html" class="view-all">View All</a>
      </div>
      <div class="products-grid" id="upsellGrid"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="shared.js"></script>
  <script>
    document.getElementById('nav-placeholder').innerHTML = renderNav('cart.html');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();
    initMobileNav();

    let promoApplied = false;
    let discountPct = 0;

    function renderCart() {
      const items = Cart.get();
      const sub = Cart.subtotal();
      const count = Cart.count();

      document.getElementById('cartSub').textContent = count
        ? `${count} item${count!==1?'s':''} in your bag`
        : 'Your bag is empty';

      if (!items.length) {
        document.getElementById('mainContent').innerHTML = `
          <div class="empty-cart">
            <span class="empty-cart-icon">🛍</span>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added anything yet. Explore the collection to find your next statement piece.</p>
            <a href="shop.html" class="btn btn-dark">Explore Collection</a>
          </div>`;
        document.getElementById('upsellSection').style.display = 'none';
        return;
      }

      const discount = promoApplied ? Math.round(sub * discountPct) : 0;
      const shipping = sub >= 5000 ? 0 : 250;
      const total = sub - discount + shipping;
      const savings = items.reduce((s,i) => {
        const p = PRODUCTS.find(x=>x.id===i.productId);
        return p && p.oldPrice ? s + (p.oldPrice - p.price)*i.qty : s;
      }, 0);

      document.getElementById('mainContent').innerHTML = `
        <div class="cart-grid">
          <div class="cart-items" id="cartItemsEl">
            ${items.map(item => {
              const p = PRODUCTS.find(x=>x.id===item.productId);
              return `<div class="cart-item" data-key="${item.key}">
                <div class="ci-img"><a href="product.html?id=${item.productId}"><img src="${item.image}" alt="${item.name}" loading="lazy"/></a></div>
                <div class="ci-body">
                  <div>
                    <div class="ci-name"><a href="product.html?id=${item.productId}">${item.name}</a></div>
                    <div class="ci-meta">
                      Size: ${item.size}<br/>
                      ${item.sub}
                    </div>
                  </div>
                  <div class="ci-actions">
                    <div class="ci-qty">
                      <button class="ci-qty-btn" onclick="changeItemQty('${item.key}', ${item.qty-1})">−</button>
                      <input class="ci-qty-val" type="number" value="${item.qty}" min="1" max="10" readonly/>
                      <button class="ci-qty-btn" onclick="changeItemQty('${item.key}', ${item.qty+1})">+</button>
                    </div>
                    <button class="ci-remove" onclick="removeItem('${item.key}')">Remove</button>
                  </div>
                </div>
                <div class="ci-price">
                  <div class="ci-unit-price">${fmt(item.price)} each</div>
                  <div>
                    <div class="ci-total-price">${fmt(item.price * item.qty)}</div>
                    ${p && p.oldPrice ? `<div class="ci-save">Save ${fmt((p.oldPrice-p.price)*item.qty)}</div>` : ''}
                  </div>
                </div>
              </div>`;
            }).join('')}
          </div>

          <div class="cart-summary">
            <div class="cs-title">Order Summary</div>
            <div class="cs-row"><span>Subtotal (${count} items)</span><span>${fmt(sub)}</span></div>
            ${discount ? `<div class="cs-row" style="color:var(--rust)"><span>Promo (${Math.round(discountPct*100)}% off)</span><span>−${fmt(discount)}</span></div>` : ''}
            <div class="cs-row"><span>Shipping</span><span>${shipping===0?'<span style="color:var(--green)">Free</span>':fmt(shipping)}</span></div>
            <div class="cs-row total"><span>Total</span><span>${fmt(total)}</span></div>
            ${savings > 0 ? `<div class="cs-saving">You're saving ${fmt(savings)} on this order 🎉</div>` : ''}

            <div class="cs-promo">
              <div class="promo-label">Promo Code</div>
              <div class="promo-row">
                <input class="promo-input" id="promoInput" placeholder="ENTER CODE" maxlength="12" ${promoApplied?'disabled':''}/>
                <button class="promo-btn" onclick="applyPromo()" ${promoApplied?'disabled':''}>Apply</button>
              </div>
              <div id="promoMsg" style="font-size:.72rem;margin-top:8px;color:var(--taupe)">
                ${promoApplied ? '<span style="color:var(--green)">✓ Code applied!</span>' : 'Try: WELCOME10 or VEIL20'}
              </div>
            </div>

            <a href="checkout.html" class="btn btn-dark btn-full" style="margin-bottom:12px;font-size:.72rem">Proceed to Checkout</a>
            <a href="shop.html" class="btn btn-outline btn-full" style="font-size:.72rem">Continue Shopping</a>

            <div class="cs-trust">
              <div class="cs-trust-item">🔒 Secure</div>
              <div class="cs-trust-item">↩️ 30-day returns</div>
              <div class="cs-trust-item">🚚 Free over ₹5k</div>
            </div>
          </div>
        </div>`;

      // Upsell
      const cartIds = items.map(i=>i.productId);
      const upsell = PRODUCTS.filter(p=>!cartIds.includes(p.id)).slice(0,4);
      document.getElementById('upsellGrid').innerHTML = upsell.map((p,i)=>renderProductCard(p,i*0.07)).join('');
      initReveal(); Wishlist.updateIcons();
    }

    function changeItemQty(key, qty) {
      if (qty < 1) { removeItem(key); return; }
      Cart.updateQty(key, qty);
      renderCart();
    }

    function removeItem(key) {
      Cart.remove(key);
      showToast('Item removed from cart');
      renderCart();
    }

    const promoCodes = { 'WELCOME10': 0.10, 'VEIL20': 0.20, 'FIRST15': 0.15 };

    function applyPromo() {
      const code = document.getElementById('promoInput').value.trim().toUpperCase();
      if (promoCodes[code]) {
        promoApplied = true;
        discountPct = promoCodes[code];
        showToast(`✓ ${Math.round(discountPct*100)}% discount applied!`);
      } else {
        document.getElementById('promoMsg').innerHTML = '<span style="color:var(--rust)">Invalid code. Try: WELCOME10 or VEIL20</span>';
      }
      renderCart();
    }

    renderCart();
  </script>
</body>
</html>
